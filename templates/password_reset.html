<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khôi phục mật khẩu - WMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #3b5cf6; }
        body { background: #eef2f6; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .reset-container { background: #ffffff; border-radius: 32px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08); overflow: hidden; max-width: 960px; width: 100%; min-height: 520px; }
        .form-side { padding: 50px 60px; display: flex; flex-direction: column; justify-content: center; }
        .reset-title { font-weight: 700; color: #1e293b; font-size: 1.8rem; margin-bottom: 15px; }
        .form-label { font-size: 0.85rem; color: #94a3b8; font-weight: 500; margin-bottom: 6px; }
        .form-control { background-color: #f1f5f9; border: 1px solid #f1f5f9; border-radius: 12px; padding: 12px 16px; color: #334155; font-weight: 500; }
        .form-control:focus { background-color: #ffffff; border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(59, 92, 246, 0.1); }
        .btn-reset { background-color: var(--primary-color); border: none; border-radius: 12px; padding: 12px; font-weight: 600; color: white; transition: all 0.2s; }
        .btn-reset:hover { background-color: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 92, 246, 0.2); }
        .illustration-side { background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; border-left: 1px solid #f1f5f9; }
        .illustration-img { max-width: 260px; height: auto; margin-bottom: 25px; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @media (max-width: 768px) { .illustration-side { display: none; } .form-side { padding: 40px 30px; } }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="row g-0">
            <div class="col-md-6 form-side">
                <h1 class="reset-title">Reset Password</h1>
                <p class="text-secondary small mb-4">Nhập email đăng ký tài khoản của bạn. Hệ thống sẽ tự động gửi một liên kết khôi phục mật khẩu bảo mật qua hộp thư.</p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required autocomplete="email">
                    </div>
                    <button type="submit" class="btn btn-reset w-100 mb-3">Send Reset Link</button>
                    <div class="text-center mt-2">
                        <a href="{% url 'login' %}" class="text-decoration-none small fw-bold" style="color: var(--primary-color);">Back to Sign In</a>
                    </div>
                </form>
            </div>
            <div class="col-md-6 illustration-side">
                <img src="https://img.freepik.com/free-vector/3d-isometric-computer-security-concept-with-shield-lock_107791-28549.jpg" alt="Security" class="illustration-img">
                <h4 class="fw-bold text-dark">Bảo mật tài khoản WMS</h4>
                <p class="text-secondary small max-width-320 m-0">Đường dẫn đặt lại mật khẩu có thời hạn sử dụng trong vòng 24 giờ để đảm bảo an toàn tuyệt đối cho kho dữ liệu.</p>
            </div>
        </div>
    </div>
</body>
</html>

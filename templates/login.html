<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - WMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-sm border-0" style="width: 400px;">
        <div class="card-body p-5">
            <h3 class="text-center fw-bold text-primary mb-4">ĐĂNG NHẬP WMS</h3>

            <form action="{% url 'login' %}" method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Tên đăng nhập" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Mật khẩu" required>
                </div>
                <div class="mb-3 d-flex justify-content-center">
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAADTcbVMPTiNavXly" data-theme="light"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Đăng nhập</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'register' %}" class="text-decoration-none small">Chưa có tài khoản? Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    {% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            {% for message in messages %}
                let iconType = 'info';
                let titleText = 'Thông báo';

                {% if message.tags == 'error' %}
                    iconType = 'error';
                    titleText = 'Đăng nhập thất bại!';
                {% elif message.tags == 'success' %}
                    iconType = 'success';
                    titleText = 'Thành công!';
                {% endif %}

                Swal.fire({
                    icon: iconType,
                    title: titleText,
                    text: '{{ message }}',
                    confirmButtonText: 'Đã hiểu',
                    confirmButtonColor: '#0d6efd',
                    timer: 4000,
                    timerProgressBar: true,
                    backdrop: `rgba(0,0,0,0.5)`
                });
            {% endfor %}
        });
    </script>
    {% endif %}
</body>
</html>

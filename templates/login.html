<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Hệ thống WMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 100%); height: 100vh; display: flex; align-items: center; }
        .login-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-login { background: #1d6f42; border: none; font-weight: bold; }
        .btn-login:hover { background: #155231; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card login-card p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">WMS LOGIN</h3>
                    <p class="text-muted small">Hệ thống Quản lý Nhập - Xuất - Tồn</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Tên đăng nhập</label>
                        <input type="text" name="username" class="form-control" placeholder="Nhập username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Mật khẩu</label>
                        <input type="password" name="password" class="form-control" placeholder="********" required>
                    </div>
                    <button type="submit" class="btn btn-login text-white w-100 py-2 mb-3">ĐĂNG NHẬP</button>
                    <div class="text-center">
                        <a href="{% url 'register' %}" class="text-decoration-none small text-success">Chưa có tài khoản? Đăng ký ngay</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>

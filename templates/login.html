<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - WMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-sm border-0" style="width: 400px;">
        <div class="card-body p-5">
            <h3 class="text-center fw-bold text-primary mb-4">ĐĂNG NHẬP WMS</h3>

            {% if form.errors %}
                <div class="alert alert-danger small">Tên đăng nhập hoặc mật khẩu không đúng!</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Tài khoản</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Mật khẩu</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="cf-turnstile" data-sitekey="0x4AAAAAADTcbVMPTiNavXly"></div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">ĐĂNG NHẬP</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'register' %}" class="text-decoration-none small">Chưa có tài khoản? Đăng ký ngay</a>
            </div>
        </div>
    </div>
</body>
</html>

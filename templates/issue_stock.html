<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cấp phát Đồng phục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 700px;">
        <div class="card-header bg-dark text-white py-3">
            <h5 class="mb-0 fw-bold text-uppercase text-center">Phiếu Cấp Phát Cho Nhân Viên</h5>
        </div>
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold small">Mã số phiếu xuất</label>
                        <input type="text" name="ticket_id" class="form-control" placeholder="Ví dụ: PX-001" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small">Tên nhân viên nhận</label>
                        <input type="text" name="actor_name" class="form-control" placeholder="Nhập tên nhân viên" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold small">Đồng phục & Size cấp phát</label>
                        <select name="uniform" class="form-select" required>
                            {% for u in uniforms %}
                            <option value="{{ u.id }}">{{ u.name }} - Size {{ u.size }} (Hiện có: {{ u.quantity }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold small">Số lượng phát</label>
                        <input type="number" name="amount" class="form-control" min="1" required>
                    </div>
                </div>
                <div class="mt-4 d-flex justify-content-between">
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary px-4">Hủy bỏ</a>
                    <button type="submit" class="btn btn-success px-5 fw-bold">XÁC NHẬN CẤP PHÁT</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>

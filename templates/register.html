<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - WMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-sm border-0" style="width: 450px;">
        <div class="card-body p-5">
            <h3 class="text-center fw-bold text-success mb-4">TẠO TÀI KHOẢN MỚI</h3>

            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-success w-100 fw-bold mt-2">ĐĂNG KÝ</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'login' %}" class="text-decoration-none small text-muted">Đã có tài khoản? Quay lại đăng nhập</a>
            </div>
        </div>
    </div>

    <style>
        input[type=text], input[type=password] {
            width: 100%; padding: 8px 12px; border: 1px solid #ced4da; border-radius: 6px;
        }
    </style>
</body>
</html>

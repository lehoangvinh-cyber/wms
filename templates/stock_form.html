<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>WMS - Nhập Liệu Giao Dịch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .form-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-section { border-radius: 20px 20px 0 0; background: linear-gradient(135deg, #4a86e8 0%, #3567b5 100%); }
        .form-label { font-weight: 600; color: #495057; font-size: 0.9rem; }
        .btn-submit { padding: 12px; font-weight: bold; border-radius: 10px; transition: 0.3s; }
        .type-selector .btn-check:checked + .btn-outline-primary { background-color: #4a86e8; color: white; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card form-card">
                <!-- Header -->
                <div class="header-section p-4 text-white">
                    <div class="d-flex justify-content-between align-items-center">
                        <h4 class="mb-0"><i class="bi bi-file-earmark-plus me-2"></i>CẬP NHẬT GIAO DỊCH KHO</h4>
                        <a href="{% url 'dashboard' %}" class="btn btn-light btn-sm rounded-pill px-3"><i class="bi bi-arrow-left"></i> Quay lại</a>
                    </div>
                    <p class="mb-0 mt-2 opacity-75 small">Dựa trên mẫu báo cáo: <strong>image_ef8bf4.png</strong></p>
                </div>

                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}

                        <!-- Lựa chọn loại giao dịch -->
                        <div class="mb-4 text-center">
                            <label class="form-label d-block mb-3">LOẠI GIAO DỊCH</label>
                            <div class="btn-group type-selector w-100" role="group">
                                <input type="radio" class="btn-check" name="type" id="type_in" value="IN" checked autocomplete="off">
                                <label class="btn btn-outline-primary py-2" for="type_in"><i class="bi bi-box-arrow-in-down me-2"></i>NHẬP KHO (NCC)</label>

                                <input type="radio" class="btn-check" name="type" id="type_out" value="OUT" autocomplete="off">
                                <label class="btn btn-outline-primary py-2" for="type_out"><i class="bi bi-box-arrow-up me-2"></i>XUẤT KHO (CẤP PHÁT)</label>
                            </div>
                        </div>

                        <div class="row g-3">
                            <!-- Thông tin chứng từ -->
                            <div class="col-md-6">
                                <label class="form-label">SỐ CHỨNG TỪ (TICKET ID)</label>
                                <input type="text" name="ticket_id" class="form-control bg-light" placeholder="Ví dụ: PN001, PX042" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">NGÀY THỰC HIỆN</label>
                                <input type="date" name="date" class="form-control bg-light" value="{% now 'Y-m-d' %}" required>
                            </div>

                            <!-- Thông tin đối tác/nhân viên -->
                            <div class="col-12">
                                <label class="form-label" id="actor_label">NHÀ CUNG CẤP / NGƯỜI GIAO</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                    <input type="text" name="actor_name" class="form-control bg-light" placeholder="Nhập tên NCC hoặc Nhân viên nhận..." required>
                                </div>
                            </div>

                            <hr class="my-4 opacity-0">

                            <!-- Thông tin Vật tư (Dựa trên image_ef8bf4.png) -->
                            <div class="col-md-12">
                                <label class="form-label">CHỌN VẬT TƯ (ĐỒNG PHỤC)</label>
                                <select name="uniform" class="form-select bg-light py-2" required>
                                    <option value="" selected disabled>-- Chọn Mã VT / Tên vật tư --</option>
                                    {% for u in uniforms %}
                                    <option value="{{ u.id }}">[{{ u.sku }}] {{ u.name }} - Size {{ u.size }} (Tồn: {{ u.quantity }})</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">SỐ LƯỢNG GIAO DỊCH</label>
                                <div class="input-group">
                                    <input type="number" name="amount" class="form-control bg-light py-2" min="1" placeholder="Nhập số lượng..." required>
                                    <span class="input-group-text bg-light">Bộ/Cái</span>
                                </div>
                            </div>

                            <div class="col-md-6 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary w-100 btn-submit shadow-sm">
                                    <i class="bi bi-cloud-arrow-up-fill me-2"></i> LƯU GIAO DỊCH
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Tự động đổi nhãn người giao/nhận khi đổi loại giao dịch
    const radioIn = document.getElementById('type_in');
    const radioOut = document.getElementById('type_out');
    const actorLabel = document.getElementById('actor_label');

    radioIn.addEventListener('change', () => actorLabel.innerText = 'NHÀ CUNG CẤP / NGƯỜI GIAO');
    radioOut.addEventListener('change', () => actorLabel.innerText = 'NHÂN VIÊN NHẬN ĐỒNG PHỤC');
</script>

</body>
</html>

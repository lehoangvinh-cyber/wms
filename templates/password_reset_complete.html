<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu thành công - WMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f6; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .success-card { background: #ffffff; border-radius: 24px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06); max-width: 480px; width: 100%; padding: 50px 40px; text-align: center; border: none; }
        .icon-box { color: #22c55e; margin-bottom: 25px; animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-login { background-color: #3b5cf6; border: none; border-radius: 12px; padding: 12px; font-weight: 600; color: white; transition: all 0.2s; display: block; text-decoration: none; }
        .btn-login:hover { background-color: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 92, 246, 0.2); color: white; }
        @keyframes scaleUp { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="card success-card">
        <div class="icon-box">
            <i class="fas fa-check-circle fa-5x"></i>
        </div>
        <h3 class="fw-bold text-dark mb-2">Thành công!</h3>
        <p class="text-secondary small mb-4">Mật khẩu của bạn đã được cập nhật thay đổi thành công vào hệ thống WMS. Giờ đây bạn đã có thể đăng nhập bằng mật khẩu mới này.</p>

        <a href="{% url 'login' %}" class="btn btn-login">Đăng nhập ngay</a>
    </div>

</body>
</html>
